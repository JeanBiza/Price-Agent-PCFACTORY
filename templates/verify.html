<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verificar codigo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold">Price Agent PCFactory</span>
    </nav>

    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow p-4" style="max-width: 400px;">
            <h3 class="mb-4 fw-bold">Verificar Correo electronico</h3>
            <h5 class="card-title mb-3">Se te ha enviado un codigo de confirmacion.</h5>
            <form action="/verify" method="POST">
                <div class="mb-3">
                    <label for="user_code" class="form-label">Correo electrónico</label>
                    <input type="text" name="user_code" id="user_code" class="form-control" placeholder="XXXXXX">
                </div>

                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}

                <button type="submit" class="btn btn-dark w-100">Verificar</button>
            </form>

            <p class="text-center text-muted mt-3 mb-0">
                <a class="text-dark" href="/">Volver</a>
            </p>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
