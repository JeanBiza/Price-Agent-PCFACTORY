<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold">Price Agent PCFactory</span>
        <div class="d-flex gap-3">
            <a href="/profile" class="btn btn-outline-light btn-sm">Perfil</a>
            <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>
        </div>
    </nav>

    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow p-5" style="max-width: 500px;">
            <h3 class="mb-4 fw-bold">Perfil</h3>

            <form action="/profile" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="text" name="email" id="email" class="form-control" placeholder="tu@email.com" value="{{user[1] or ''}}">
                </div>
                <div class="mb-3">
                    <label for="telegram_id" class="form-label">Telegram ID</label>
                    <input type="text" name="telegram_id" id="telegram_id" class="form-control" placeholder="••••••••" value="{{user[3] or ''}}">
                </div>

                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}

                <button type="submit" class="btn btn-dark w-100">Guardar cambios</button>
            </form>
            <p class="text-center text-muted mt-3 mb-0">
                <a class="text-dark" href="/">Volver</a>
            </p>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
