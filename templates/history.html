<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial - {{ product[2] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold">Price Agent</span>
        <div class="d-flex gap-3">
            <a href="/profile" class="btn btn-outline-light btn-sm">Perfil</a>
            <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="/" class="btn btn-outline-secondary btn-sm">← Volver</a>
            <h5 class="mb-0 fw-bold">{{ product[2] }}</h5>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Historial de precios</h5>
                {% if history %}
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for entry in history %}
                        <tr>
                            <td>{{ entry[4] }}</td>
                            <td>${{ "{:,.0f}".format(entry[3]).replace(",", ".") }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <p class="text-muted mb-0">No hay historial para este producto aún.</p>
                {% endif %}
            </div>
        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
